<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Clone</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="logo">
            <h2>YouTube</h2>
        </div>

        <div class="search-box">
            <input type="text" placeholder="Search">
            <button>Search</button>
        </div>

        <div class="profile">
            <img src="https://via.placeholder.com/40" alt="Profile">
        </div>
    </header>

    <!-- Sidebar -->
    <aside class="sidebar">
        <ul>
            <li>Home</li>
            <li>Shorts</li>
            <li>Subscriptions</li>
            <li>Library</li>
            <li>History</li>
        </ul>
    </aside>

    <!-- Main Content -->
    <main class="videos">
        <div class="video-card">
            <img src="https://www.youtube.com/watch?v=EGqHVjU-fas&t=3527s" alt="video">
            <h4>Video Title 1</h4>
            <p>Hitesh</p>
        </div>

        <div class="video-card">
            <img src="https://via.placeholder.com/300x180" alt="video">
            <h4>Video Title 2</h4>
            <p>PW</p>
        </div>

        <div class="video-card">
            <img src="https://via.placeholder.com/300x180" alt="video">
            <h4>Video Title 3</h4>
            <p>KGS</p>
        </div>

        <div class="video-card">
            <img src="https://via.placeholder.com/300x180" alt="video">
            <h4>Video Title 4</h4>
            <p>Dear sir</p>
        </div>
    </main>

</body>
</html>
