<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="box">
  
  <div class="image">
    <button class="btn">Sale</button>
    <div class="like">❤️</div>
  </div>

  <div class="content">
    <h2>Luxury Beach Villa</h2>
    <p class="price">$ 250,000</p>
    <p class="details">
      4 Bedroom • 3 Bathroom • Swimming Pool • Sea View • Fully Furnished
    </p>
    <button class="book-btn">View Details</button>
  </div>

</div>
  
</body>
</html>
